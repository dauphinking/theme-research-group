{{- $keywords := site.Params.marketing.seo.keywords | default slice -}}
{{- with $keywords }}
<meta name="keywords" content="{{ delimit . ", " }}">
{{- end }}
{{- if .IsHome }}
<link rel="alternate" hreflang="x-default" href="{{ site.BaseURL }}">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "ResearchOrganization",
      "@id": "{{ site.BaseURL }}",
      "name": "上海交通大学复杂系统智能控制实验室",
      "alternateName": ["SJTU CSC Lab", "CSC Lab", "Complex Systems Control Laboratory"],
      "url": "{{ site.BaseURL }}",
      "description": {{ site.Params.marketing.seo.description | jsonify | safeJS }},
      "parentOrganization": {
        "@type": "CollegeOrUniversity",
        "name": "上海交通大学",
        "alternateName": "Shanghai Jiao Tong University",
        "url": "https://www.sjtu.edu.cn/"
      },
      "knowsAbout": [
        "Model Predictive Control",
        "Advanced Process Control",
        "Data-driven Control",
        "Industrial Control Software",
        "Robotics",
        "Intelligent Transportation"
      ]
    },
    {
      "@type": "Person",
      "@id": "{{ site.BaseURL }}zh/author/金碧辉/#person",
      "name": "金碧辉",
      "alternateName": "Bihui Jin",
      "url": "{{ site.BaseURL }}zh/author/金碧辉/",
      "memberOf": {
        "@id": "{{ site.BaseURL }}"
      },
      "worksFor": {
        "@type": "Organization",
        "name": "上海碧帝数据科技有限公司",
        "alternateName": "Shanghai Bidi Data Technology",
        "url": "https://biditech.cn/"
      },
      "knowsAbout": ["Model Predictive Control", "QD-APC", "Edge Control", "Industrial Software"]
    }
  ]
}
</script>
{{- end }}
{{- if eq .Section "industry" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "@id": "{{ .Permalink }}#webpage",
  "url": "{{ .Permalink }}",
  "name": {{ .Title | jsonify | safeJS }},
  "description": {{ .Params.summary | jsonify | safeJS }},
  "about": [
    {
      "@type": "ResearchOrganization",
      "@id": "{{ site.BaseURL }}",
      "name": "上海交通大学复杂系统智能控制实验室"
    },
    {
      "@type": "SoftwareApplication",
      "name": "QD-APC",
      "applicationCategory": "IndustrialControlApplication"
    }
  ]
}
</script>
{{- end }}
{{- if in .RelPermalink "advanced-apc-software-system" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "@id": "{{ .Permalink }}#software",
  "name": "QD-APC",
  "url": "{{ .Permalink }}",
  "description": {{ .Params.summary | jsonify | safeJS }},
  "applicationCategory": "IndustrialControlApplication",
  "operatingSystem": "Industrial edge computing and control systems",
  "creator": {
    "@type": "ResearchOrganization",
    "@id": "{{ site.BaseURL }}",
    "name": "上海交通大学复杂系统智能控制实验室"
  },
  "provider": {
    "@type": "Organization",
    "name": "上海碧帝数据科技有限公司",
    "alternateName": "Shanghai Bidi Data Technology",
    "url": "https://biditech.cn/"
  }
}
</script>
{{- end }}
